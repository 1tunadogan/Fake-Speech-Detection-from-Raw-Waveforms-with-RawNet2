# RawNet2 Anti-Spoofing Configuration
# ASVspoof 2019 LA - End-to-end fake speech detection

# ═══════════════════════════════════════════════════════════════
#  W&B Experiment Tracking
# ═══════════════════════════════════════════════════════════════
wandb:
  project: "rawnet2-antispoofing"
  entity: null
  name: null
  group: null
  tags: ["RawNet2", "ASVspoof2019-LA"]
  notes: null
  mode: "online"
  log_model: true

# ═══════════════════════════════════════════════════════════════
#  Data
# ═══════════════════════════════════════════════════════════════
data:
  data_dir: "data/LA"
  sample_rate: 16000
  input_length: 64000

# ═══════════════════════════════════════════════════════════════
#  Model Architecture
# ═══════════════════════════════════════════════════════════════
model:
  sinc_filters: 128
  sinc_kernel_size: 129
  sinc_scale: "mel"

  resblock_filts: [[128, 128], [128, 512]]
  resblock_blocks: [2, 4]

  gru_hidden: 1024
  gru_layers: 3
  fc_hidden: 1024
  num_classes: 2

# ═══════════════════════════════════════════════════════════════
#  Training
# ═══════════════════════════════════════════════════════════════
training:
  lr: 0.0001
  weight_decay: 0.0001
  epochs: 100
  batch_size: 32
  loss: "weighted_ce"
  seed: 1234
  save_dir: "weights"
  log_interval: 10

# ═══════════════════════════════════════════════════════════════
#  Evaluation
# ═══════════════════════════════════════════════════════════════
eval:
  checkpoint: null
  eval_output: "scores.txt"
